      --rotation: 0deg;

      animation: scaleUp 0.5s ease forwards;

      animation-delay: 0s;

    /* Cartita ((: */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .carta-container {
      height: 100vh;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      position: absolute;
      z-index: 9999;
    }

    #open {
      display: none;
    }

    .wrapper {
      height: 200px;
      width: 300px;
      background-color: #f5f5f5;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      perspective: 1000px;
    }

    .tapa {
      position: absolute;
      height: 100%;
      width: 100%;
      top: 0;
      left: 0;
      border-right: 150px solid transparent;
      border-bottom: 100px solid transparent;
      border-left: 150px solid transparent;
      transform-origin: top;
      transition: transform 0.4s ease;
    }

    .tapa.uno {
      border-top: 100px solid #ffffff;
      transform: rotateX(0deg);
      z-index: 4;
      transition-delay: 0.6s;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.15));
    }

    .tapa.dos {
      border-top: 100px solid #e6e6e6;
      transform: rotateX(90deg);
      z-index: 1;
      transition-delay: 0.3s;
    }

    .envelope {
      position: absolute;
      height: 100%;
      width: 100%;
      top: 0;
      left: 0;
      border-top: 100px solid transparent;
      border-right: 150px solid #f0f0f0;
      border-bottom: 100px solid #ffffff;
      border-left: 150px solid #eaeaea;
      z-index: 3;
    }

    .carta {
      position: absolute;
      top: 0;
      width: 85%;
      height: 90%;
      background-color: white;
      border-radius: 15px;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;

      font-size: 18px;
      line-height: 1.4;

      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);

      z-index: 2;
      transform: translateY(0) scale(1);
      transition: transform 0.6s ease, z-index 0s linear 0.4s;
      font-family: 'Dancing Script', cursive;
    }

    .photo {
      position: absolute;
      top: 10px;
      width: 120px;
      height: 140px;
      background-color: #fff;
      border-radius: 1px;
      overflow: hidden;
      padding: 10px;
      padding-bottom: 30px;

      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);

      z-index: 2;
      transform: translateY(0) rotate(0deg) scale(1);
      transition: transform 0.7s ease, z-index 0s linear 0.6s;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #open:checked+.wrapper .tapa.uno {
      transform: rotateX(90deg);
      transition-delay: 0s;
    }

    #open:checked+.wrapper .tapa.dos {
      transform: rotateX(180deg);
      transition-delay: 0.2s;
    }

    #open:checked+.wrapper .carta {
      transform: translateY(-220px) scale(1.4);
      z-index: 5;
      transition-delay: 0.4s, 0.4s;
    }

    #open:checked + .wrapper .photo {
      transform: translateY(-20px) translateX(150px) rotate(6deg) scale(1.6);
      z-index: 6;
      transition-delay: 0.6s, 0.6s;
    }

    .sello {
      position: absolute;
      top: 90px;
      left: 50%;
      transform: translateX(-50%);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #fff8dc;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      z-index: 5;
      box-shadow: 
        0 4px 10px rgba(0,0,0,0.15),
        inset 0 2px 4px rgba(255,255,255,0.6);
      transition: transform 0.4s ease, opacity 0.3s ease;
    }

    .dedicatoria {
      position: absolute;
      top: 150px;
      left: 50%;
      transform: translateX(-50%);
      
      text-align: left;
      font-size: 14px;
      color: #555;

      font-family: 'Dancing Script', cursive;

      z-index: 4;
      pointer-events: none;
    }

    .dedicatoria p {
      margin: 2px 0;
    }
